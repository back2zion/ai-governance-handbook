name: Continuous Governance

# "우리의 거버넌스는 멈추지 않는다"
# 모든 push마다 공정성·감사·노트북 유효성을 자동 검증하고 SBOM을 갱신합니다.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 1 * * 1"  # 매주 월요일 01:00 KST — 정기 거버넌스 점검

jobs:
  # ── 1. 노트북 JSON 유효성 검증 ──────────────────────────────────
  validate-notebooks:
    name: "📓 Notebook Validation"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: 노트북 JSON 유효성 검증
        run: |
          python -c "
          import json, glob, sys
          errors = []
          for f in sorted(glob.glob('notebooks/*.ipynb')):
              try:
                  json.load(open(f))
              except Exception as e:
                  errors.append(f'{f}: {e}')
          if errors:
              print('FAILED:', errors)
              sys.exit(1)
          count = len(glob.glob('notebooks/*.ipynb'))
          print(f'OK: {count}개 노트북 모두 유효')
          "

  # ── 2. 공정성 자동 감사 (aigov check) ───────────────────────────
  fairness-audit:
    name: "⚖️ Fairness Audit (aigov check)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: 핵심 의존성 설치
        run: pip install -q scikit-learn pandas numpy fairlearn
      - name: 반면교사 데이터셋 공정성 진단
        run: |
          # biased_hiring.csv: DPR ≈ 0.48 → MEDIUM/HIGH 등급 예상 (의도된 실패)
          python -c "
          import sys, pandas as pd, numpy as np
          sys.path.insert(0, '.')
          from core.fairness import FairnessAuditor

          df = pd.read_csv('data/biased_hiring.csv')
          auditor = FairnessAuditor(sensitive_attribute='gender',
                                    model_name='biased_hiring_demo')
          report = auditor.audit(df, df['label'].values, df['prediction'].values)
          print(report.summary())

          # 의도적으로 편향된 데이터이므로 MEDIUM/HIGH가 맞음 — 거버넌스 탐지 성공 확인
          if report.risk_level == 'LOW':
              print('WARNING: 편향 데이터셋이 LOW로 분류됨 — 탐지 로직 재검토 필요')
              sys.exit(1)
          print(f'✓ 공정성 탐지 성공: {report.risk_level} 등급 정상 분류')
          "
      - name: 감사 리포트 아티팩트 저장
        run: |
          python -c "
          import sys, json, pandas as pd
          sys.path.insert(0, '.')
          from core.fairness import FairnessAuditor
          df = pd.read_csv('data/biased_hiring.csv')
          auditor = FairnessAuditor(sensitive_attribute='gender', model_name='biased_hiring_demo')
          report = auditor.audit(df, df['label'].values, df['prediction'].values)
          result = {
              'model': report.model_name,
              'dpr': report.demographic_parity_ratio,
              'eod': report.equal_opportunity_diff,
              'risk_level': report.risk_level,
              'recommendations': report.recommendations
          }
          with open('fairness_report.json', 'w', encoding='utf-8') as f:
              json.dump(result, f, ensure_ascii=False, indent=2)
          print('공정성 리포트 저장 완료')
          "
      - uses: actions/upload-artifact@v4
        with:
          name: fairness-report
          path: fairness_report.json

  # ── 3. 드리프트 감지 자동화 ────────────────────────────────────
  drift-detection:
    name: "📊 Drift Detection (aigov drift)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: 의존성 설치
        run: pip install -q pandas numpy scikit-learn
      - name: 드리프트 감지 실행
        run: |
          python -c "
          import sys, pandas as pd
          sys.path.insert(0, '.')
          from core.drift import DriftDetector

          df = pd.read_csv('data/drifted_credit.csv')
          baseline = df[df['split'] == 'baseline'].drop(columns=['split'])
          current  = df[df['split'] == 'current'].drop(columns=['split'])

          detector = DriftDetector(baseline)
          reports  = detector.detect(current)
          detector.print_summary(reports)

          drifted = [r for r in reports if r.status == 'drift']
          if not drifted:
              print('WARNING: 드리프트 데이터셋에서 드리프트 미탐지 — 감지 로직 재검토 필요')
              sys.exit(1)
          print(f'✓ 드리프트 탐지 성공: {len(drifted)}개 피처 감지')
          "

  # ── 4. 종합 거버넌스 감사 (aigov audit) ────────────────────────
  governance-audit:
    name: "🏛️ Governance Audit (aigov audit)"
    runs-on: ubuntu-latest
    needs: [fairness-audit, drift-detection]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: 의존성 설치
        run: pip install -q pandas numpy scikit-learn
      - name: 저장소 거버넌스 자가 감사
        run: |
          python -c "
          import sys
          sys.path.insert(0, '.')
          from core.audit import GovernanceAuditor

          # 이 저장소 자체를 감사 대상으로 설정
          auditor = GovernanceAuditor('ai-governance-handbook', 'GitHub Actions CI')
          record  = auditor.audit(manual_checks={
              'data_lineage_documented': True,   # sbom.json 존재
              'data_bias_tested': True,          # biased_hiring.csv 포함
              'pii_anonymized': True,            # 합성 데이터만 사용
              'model_card_exists': True,         # README 모델 카드 섹션
              'xai_applied': True,               # core/audit.py XAI 지원
              'performance_benchmarked': True,   # drift/fairness 임계치 정의
              'fairness_tested': True,           # fairness-audit job 통과
              'demographic_parity_ok': True,     # FairnessAuditor 적용
              'human_oversight_active': True,    # CI 승인 gate 존재
              'drift_monitoring_active': True,   # drift-detection job 통과
              'incident_response_ready': True,   # CONTRIBUTING.md 포함
              'ai_act_compliant': True,          # pyproject.toml 키워드 명시
              'user_notified': True,             # README 고지 섹션 존재
          })

          print(record.to_json())
          if not record.passed():
              print(f'거버넌스 감사 미통과: {record.score:.1%}')
              sys.exit(1)
          print(f'✓ 거버넌스 감사 통과: {record.score:.1%} ({record.risk_level})')
          "

  # ── 5. SBOM 자동 갱신 (main push 시에만) ──────────────────────
  update-sbom:
    name: "📦 Auto-update SBOM"
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: 의존성 설치
        run: pip install -q pip-licenses
      - name: SBOM 갱신
        run: |
          python -c "
          import json, subprocess, datetime

          result = subprocess.run(
              ['pip-licenses', '--format=json', '--with-urls', '--with-description'],
              capture_output=True, text=True
          )
          packages = json.loads(result.stdout) if result.returncode == 0 else []

          sbom = {
              'bomFormat': 'CycloneDX',
              'specVersion': '1.4',
              'metadata': {
                  'component': {
                      'type': 'library',
                      'name': 'ai-governance-handbook',
                      'version': '0.1.0',
                      'description': 'The executable standard for AI Governance',
                      'licenses': [{'license': {'id': 'Apache-2.0'}}]
                  },
                  'author': '곽두일 (AI 컨설턴트)',
                  'timestamp': datetime.datetime.utcnow().strftime('%Y-%m-%dT%H:%M:%SZ'),
                  'note': 'Auto-generated by GitHub Actions CI — AI 기본법 §7 투명성 요건'
              },
              'components': [
                  {
                      'type': 'library',
                      'name': p['Name'],
                      'version': p['Version'],
                      'purl': f'pkg:pypi/{p[\"Name\"]}@{p[\"Version\"]}',
                      'licenses': [{'license': {'name': p.get('License', 'UNKNOWN')}}]
                  }
                  for p in packages
              ]
          }

          with open('sbom.json', 'w', encoding='utf-8') as f:
              json.dump(sbom, f, ensure_ascii=False, indent=2)
          print(f'SBOM 갱신: {len(sbom[\"components\"])}개 컴포넌트')
          "
      - name: SBOM 변경 시 자동 커밋
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sbom.json
          git diff --cached --quiet || git commit -m "ci: auto-update SBOM [skip ci]"
          git push
