name: Notebook Validation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-notebooks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: JSON 유효성 검증
        run: |
          python -c "
          import json, glob, sys
          errors = []
          for f in glob.glob('notebooks/*.ipynb'):
              try: json.load(open(f))
              except Exception as e: errors.append(f'{f}: {e}')
          if errors:
              print('FAILED:', errors); sys.exit(1)
          print(f'OK: {len(glob.glob(\"notebooks/*.ipynb\"))}개 노트북 유효')
          "
